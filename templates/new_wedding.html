{% extends "base.html" %}
{% block title %}New Wedding{% endblock %}
{% block content %}
<div class="page-header"><h1>Create New Wedding</h1></div>
<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Couple Names *</label>
            <input type="text" name="couple_names" required placeholder="e.g., John & Jane Smith">
        </div>
        <div class="form-group">
            <label>Wedding Date *</label>
            <input type="date" name="wedding_date" required>
        </div>
        <div class="form-group">
            <label>Contact Email *</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Create Wedding</button>
            <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
