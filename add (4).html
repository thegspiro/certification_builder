{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Add Wedding Party Member</h1>
</div>

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text" name="role" placeholder="e.g., Maid of Honor, Best Man, Attendant">
        </div>

        <div class="form-group">
            <label>Side</label>
            <select name="side">
                <option value="">Not specified</option>
                {% for person in wedding.people|sort(attribute='display_order') %}
                    {% if person.side_label %}
                    <option value="{{ person.side_label }}">{{ person.side_label }}</option>
                    {% else %}
                    <option value="{{ person.name }}'s side">{{ person.name }}'s side</option>
                    {% endif %}
                {% endfor %}
                <option value="Both">Both / Shared</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>

        <div class="form-group">
            <label>Processional Order</label>
            <input type="number" name="processional_order" min="1" placeholder="1, 2, 3...">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Member</button>
            <a href="{{ url_for('bridal_party_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
